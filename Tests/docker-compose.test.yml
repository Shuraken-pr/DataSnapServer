version: '3.8'

services:
  postgres-test:
    image: postgres:14-alpine
    container_name: audit-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: audit_test
    ports:
      - "5433:5432"  # Отдельный порт, чтобы не конфликтовать с продакшеном
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init.sql
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d audit_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  test-db-data: